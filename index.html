<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUTS BAR 升盲系统</title>
    
    <!-- PWA Manifest 引用外部文件 -->
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NUTS BAR">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg-deep: #0d0705;
            --primary: #e8a850;
            --primary-bright: #f5c882;
            --gold: #d4a853;
            --gold-light: #e8c97a;
            --danger: #ff4757;
            --break-color: #7adce4;
            --text: #f0e6dd;
            --text-dim: #b8a898;
            --text-muted: #8a7a6a;
            --border: rgba(212, 168, 83, 0.25);
            --shadow-gold: 0 0 60px rgba(212, 168, 83, 0.4);
            --shadow-danger: 0 0 50px rgba(255, 71, 87, 0.6);
            --font-display: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --font-mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
            --card-red: #d43a3a;
            --card-black: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at 50% 30%, #2d1812 0%, #1a0f0a 50%, #0d0705 100%);
            color: var(--text);
            font-family: var(--font-display);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .gold-line-top, .gold-line-bottom {
            position: absolute;
            left: 5%;
            width: 90%;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(212,168,83,0.3), var(--gold-light), rgba(212,168,83,0.3), transparent);
            z-index: 2;
            pointer-events: none;
        }
        .gold-line-top { top: 0; }
        .gold-line-bottom { bottom: 0; }

        .poker-hand {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .poker-hand.left { left: 4%; }
        .poker-hand.right { right: 4%; }
        .poker-hand .hand-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--text-dim);
            font-weight: 700;
            text-shadow: 0 0 15px rgba(212,168,83,0.4);
        }
        .cards-stack {
            position: relative;
            width: 110px;
            height: 154px;
        }
        .playing-card {
            position: absolute;
            width: 104px;
            height: 146px;
            background: linear-gradient(145deg, #faf8f5 0%, #f0ebe0 40%, #e8e0d0 100%);
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 2px solid rgba(180,150,110,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .playing-card.card-back { top: 4px; left: 5px; z-index: 1; }
        .playing-card.card-front {
            top: 0; left: 0; z-index: 2;
            transform-origin: center center;
            animation: slide-right 2.5s ease-in-out infinite;
        }
        .card-corner { position: absolute; display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .card-corner.top-left { top: 8px; left: 10px; }
        .card-corner.bottom-right { bottom: 8px; right: 10px; transform: rotate(180deg); }
        .card-rank { font-weight: 900; font-size: 34px; font-family: 'Georgia', serif; }
        .card-suit { font-size: 26px; margin-top: -3px; }
        .card-center-suit { font-size: 50px; opacity: 0.2; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .card-red .card-rank, .card-red .card-suit, .card-red .card-center-suit { color: var(--card-red); }
        .card-black .card-rank, .card-black .card-suit, .card-black .card-center-suit { color: var(--card-black); }
        .poker-hand { animation: hand-glow 3s ease-in-out infinite; }
        .poker-hand.right { animation-delay: 1.5s; }
        @keyframes hand-glow {
            0%,100%{ filter: drop-shadow(0 0 10px rgba(232,168,80,0.4)); }
            50%{ filter: drop-shadow(0 0 28px rgba(245,200,130,0.75)); }
        }
        @keyframes slide-right {
            0%,100%{ transform: translateX(0) rotate(0deg); }
            50%{ transform: translateX(38%) rotate(5deg); }
        }
        .poker-hand.right .card-front { animation-delay: 1.25s; }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
            position: relative;
            flex-shrink: 0;
            padding: 16px 30px;
        }
        .header .logo-wrap { position: relative; flex-shrink: 0; }
        .header .logo-img {
            height: 72px;
            width: 72px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(232,168,80,0.5);
            box-shadow: 0 0 25px rgba(212,168,83,0.3);
        }
        .header .logo-fallback {
            height: 72px;
            width: 72px;
            border-radius: 16px;
            background: linear-gradient(135deg, #c4813a, #e8a850, #f5c882);
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 32px;
            color: #1a0f0a;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .header h1 {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(180deg, #f5d8a8 0%, #e8a850 30%, #d4953a 60%, #c4813a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer-gold 4.5s infinite;
            letter-spacing: 0.04em;
        }
        @keyframes shimmer-gold { 0%,100%{ background-position: 0% 30%; } 50%{ background-position: 0% 70%; } }
        .header .clock-badge {
            margin-left: auto;
            font-size: 24px;
            color: #e0d0b8;
            background: rgba(30,15,8,0.8);
            padding: 10px 24px;
            border-radius: 20px;
            font-family: var(--font-mono);
            border: 1px solid rgba(212,168,83,0.35);
            backdrop-filter: blur(6px);
            white-space: nowrap;
        }
        .clock-label { font-size: 14px; color: var(--text-muted); margin-right: 8px; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 10;
            padding: 10px 0;
        }
        .stage-badge {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            background: rgba(30,15,8,0.7);
            padding: 8px 28px;
            border-radius: 20px;
            border: 1px solid rgba(212,168,83,0.25);
            font-weight: 600;
        }
        .stage-badge.break-mode {
            color: var(--break-color);
            border-color: rgba(122,220,228,0.4);
            background: rgba(95,180,200,0.12);
        }
        .level-info {
            font-size: 44px;
            font-weight: 600;
            background: rgba(20,10,5,0.65);
            padding: 18px 50px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            backdrop-filter: blur(8px);
            letter-spacing: 0.05em;
        }
        .level-info.break-mode {
            border-color: rgba(122,220,228,0.45);
            box-shadow: 0 0 40px rgba(122,220,228,0.2);
            color: #c5f0f4;
        }
        .blinds-gold {
            font-weight: 700;
            color: var(--gold-light);
            text-shadow: 0 0 25px rgba(232,201,122,0.4);
        }

        .timer {
            font-size: 130px;
            font-weight: 900;
            font-family: var(--font-mono);
            color: #f5c882;
            text-shadow: var(--shadow-gold);
            transition: color 0.5s, text-shadow 0.5s;
            letter-spacing: 0.05em;
            line-height: 1;
        }
        .timer.warning {
            color: #ff9a56;
            text-shadow: 0 0 60px rgba(255,140,60,0.7);
            animation: pulse-warning 0.9s infinite;
        }
        .timer.danger {
            color: #ff4a4a;
            text-shadow: var(--shadow-danger);
            animation: pulse-danger 0.45s infinite;
        }
        .timer.break-timer {
            color: #7adce4;
            text-shadow: 0 0 50px rgba(122,220,228,0.5);
        }
        .timer.paused-blink { animation: blink-pause 1.6s infinite; }
        @keyframes pulse-warning { 0%,100%{transform:scale(1);} 50%{transform:scale(1.015);} }
        @keyframes pulse-danger { 0%,100%{transform:scale(1);} 50%{transform:scale(1.03);} }
        @keyframes blink-pause { 0%,100%{opacity:1;} 38%{opacity:0.3;} 72%{opacity:1;} }

        .next-preview {
            font-size: 22px;
            color: var(--text-dim);
            background: rgba(20,10,5,0.5);
            padding: 12px 30px;
            border-radius: 14px;
            border: 1px solid rgba(212,168,83,0.18);
            backdrop-filter: blur(6px);
            text-align: center;
        }
        .next-preview span { color: #d5c0a0; font-weight: 600; }

        .progress-bar-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 85vw;
            padding: 0 16px;
        }
        .progress-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.25s;
            flex-shrink: 0;
        }
        .progress-dot.active {
            background: var(--primary);
            box-shadow: 0 0 14px rgba(232,168,80,0.7);
            transform: scale(1.4);
            border-color: rgba(245,200,130,0.5);
        }
        .progress-dot.done { background: rgba(200,150,80,0.5); }
        .progress-dot.break-dot { border-radius: 50%; background: rgba(122,220,228,0.2); }
        .progress-dot.break-dot.active { background: var(--break-color); box-shadow: 0 0 14px rgba(122,220,228,0.7); }

        .btns {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
            flex-shrink: 0;
            padding: 14px 30px 20px;
        }
        button {
            background: rgba(25,12,6,0.75);
            color: #d5c8b8;
            border: 1px solid rgba(212,168,83,0.3);
            padding: 12px 24px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.22s;
            letter-spacing: 0.05em;
            backdrop-filter: blur(6px);
            font-family: inherit;
            white-space: nowrap;
            text-align: center;
        }
        button:hover {
            border-color: rgba(232,201,122,0.55);
            box-shadow: 0 0 20px rgba(212,168,83,0.25);
            transform: translateY(-2px);
        }
        button:active { transform: scale(0.95); }
        button.btn-start {
            background: linear-gradient(135deg, #b87830, #d4953a, #e8a850);
            color: #1a0f0a;
            border: none;
            box-shadow: 0 4px 20px rgba(200,140,50,0.4);
            font-size: 20px;
            padding: 14px 32px;
        }
        button.btn-start.running {
            background: #444;
            color: #999;
            pointer-events: none;
            box-shadow: none;
        }
        button.btn-pause.paused-state { opacity: 0.5; pointer-events: none; }
        button.btn-settings {
            background: rgba(30,15,8,0.8);
            border-color: rgba(212,168,83,0.35);
            color: #d5c0a0;
        }

        .settings-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .settings-overlay.open { opacity: 1; pointer-events: auto; }
        .settings-panel {
            background: linear-gradient(180deg, #1e110a 0%, #150a04 100%);
            border: 2px solid rgba(212,168,83,0.4);
            border-radius: 20px;
            padding: 30px;
            width: 75vw;
            max-width: 800px;
            max-height: 75vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(212,168,83,0.25);
            position: relative;
        }
        .settings-panel h2 {
            font-size: 30px;
            font-weight: 700;
            color: var(--gold-light);
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: 0.06em;
        }
        .settings-list-wrap { flex: 1; overflow-y: auto; max-height: 48vh; padding-right: 8px; margin-bottom: 16px; }
        .settings-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap;
        }
        .settings-row .row-num { width: 30px; text-align: center; font-size: 16px; color: var(--text-dim); font-weight: 600; }
        .settings-row select, .settings-row input {
            background: rgba(20,10,5,0.8);
            border: 1px solid rgba(212,168,83,0.35);
            color: #e0d0b8;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }
        .settings-row select { flex: 0 0 80px; font-size: 15px; }
        .settings-row input.num-input { width: 60px; text-align: center; font-size: 15px; }
        .settings-row input.label-input { flex: 1; min-width: 100px; max-width: 160px; font-size: 15px; }
        .settings-row .row-delete {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255,71,87,0.15);
            color: #ff6b6b;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,71,87,0.25);
        }
        .settings-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
        .settings-actions button { font-size: 16px; padding: 10px 20px; }
        .settings-close {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            color: #bbb;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 28px; }
            .header .logo-img { height: 44px; width: 44px; border-radius: 10px; }
            .header .clock-badge { font-size: 14px; padding: 6px 12px; }
            .clock-label { font-size: 10px; }
            .level-info { font-size: 22px; padding: 10px 20px; }
            .timer { font-size: 64px; }
            .next-preview { font-size: 14px; }
            .stage-badge { font-size: 11px; }
            button { font-size: 12px; padding: 8px 14px; }
            button.btn-start { font-size: 14px; padding: 10px 20px; }
            .poker-hand.left { left: 1%; }
            .poker-hand.right { right: 1%; }
            .cards-stack { width: 56px; height: 78px; }
            .playing-card { width: 52px; height: 72px; border-radius: 6px; }
            .card-rank { font-size: 16px; }
            .card-suit { font-size: 12px; }
            .card-center-suit { font-size: 24px; }
            .hand-label { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="gold-line-top"></div>
    <div class="gold-line-bottom"></div>

    <div class="poker-hand left">
        <span class="hand-label">Pocket Aces</span>
        <div class="cards-stack">
            <div class="playing-card card-red card-back">
                <div class="card-corner top-left"><span class="card-rank">A</span><span class="card-suit">♦</span></div>
                <span class="card-center-suit">♦</span>
                <div class="card-corner bottom-right"><span class="card-rank">A</span><span class="card-suit">♦</span></div>
            </div>
            <div class="playing-card card-red card-front">
                <div class="card-corner top-left"><span class="card-rank">A</span><span class="card-suit">♥</span></div>
                <span class="card-center-suit">♥</span>
                <div class="card-corner bottom-right"><span class="card-rank">A</span><span class="card-suit">♥</span></div>
            </div>
        </div>
    </div>
    <div class="poker-hand right">
        <span class="hand-label">Pocket Kings</span>
        <div class="cards-stack">
            <div class="playing-card card-black card-back">
                <div class="card-corner top-left"><span class="card-rank">K</span><span class="card-suit">♣</span></div>
                <span class="card-center-suit">♣</span>
                <div class="card-corner bottom-right"><span class="card-rank">K</span><span class="card-suit">♣</span></div>
            </div>
            <div class="playing-card card-black card-front">
                <div class="card-corner top-left"><span class="card-rank">K</span><span class="card-suit">♠</span></div>
                <span class="card-center-suit">♠</span>
                <div class="card-corner bottom-right"><span class="card-rank">K</span><span class="card-suit">♠</span></div>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="logo-wrap">
            <img class="logo-img" src="logo.jpg" alt="NUTS BAR" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div class="logo-fallback">N</div>
        </div>
        <h1>NUTS BAR</h1>
        <div class="clock-badge" id="liveClock"><span class="clock-label">当前时间</span>--:--</div>
    </div>

    <div class="main">
        <div class="stage-badge" id="stageBadge">盲注级别</div>
        <div class="level-info" id="levelInfo">盲注: 100/200</div>
        <div class="timer-wrap"><div class="timer" id="timer">15:00</div></div>
        <div class="next-preview" id="nextPreview">下一级: 200/400</div>
        <div class="progress-bar-wrap" id="progressBar"></div>
    </div>

    <div class="btns">
        <button class="btn-start" id="startBtn">▶ 开始</button>
        <button class="btn-pause paused-state" id="pauseBtn">⏸ 暂停</button>
        <button class="btn-reset" id="resetBtn">↺ 重置</button>
        <button class="btn-nav" id="prevBtn">◀ 上一级</button>
        <button class="btn-nav" id="nextBtn">下一级 ▶</button>
        <button class="btn-fullscreen" id="fullBtn">⛶ 全屏</button>
        <button class="btn-settings" id="settingsBtn">⚙ 设置</button>
    </div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <button class="settings-close" id="settingsClose">✕</button>
            <h2>⚙ 盲注结构设置</h2>
            <div class="settings-list-wrap" id="settingsList"></div>
            <div class="settings-actions">
                <button id="btnAddLevel">＋ 添加级别</button>
                <button class="btn-save" id="btnSaveSettings">💾 保存并使用</button>
                <button class="btn-reset-default" id="btnResetDefault">↺ 恢复默认</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'nuts-bar-tv-v3';
                    self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./'])).then(() => self.skipWaiting())); });
                    self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(n => Promise.all(n.filter(x => x !== CACHE_NAME).map(x => caches.delete(x)))).then(() => self.clients.claim())); });
                    self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))); });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
            });
        }

        (function() {
            const STORAGE_KEY = 'nutsbar_blind_levels';
            const DEFAULT_LEVELS = [
                { type: 'blind', blind1: 100, blind2: 200, ante: 0, minutes: 15, label: '盲注级别 1' },
                { type: 'blind', blind1: 200, blind2: 400, ante: 0, minutes: 15, label: '盲注级别 2' },
                { type: 'blind', blind1: 300, blind2: 600, ante: 0, minutes: 15, label: '盲注级别 3' },
                { type: 'blind', blind1: 400, blind2: 800, ante: 0, minutes: 15, label: '盲注级别 4' },
                { type: 'break', blind1: 0, blind2: 0, ante: 0, minutes: 5, label: '休息时间 1' },
                { type: 'blind', blind1: 500, blind2: 1000, ante: 0, minutes: 15, label: '盲注级别 5' },
                { type: 'blind', blind1: 600, blind2: 1200, ante: 0, minutes: 15, label: '盲注级别 6' },
                { type: 'blind', blind1: 800, blind2: 1600, ante: 0, minutes: 15, label: '盲注级别 7' },
                { type: 'blind', blind1: 1000, blind2: 2000, ante: 0, minutes: 15, label: '盲注级别 8' },
                { type: 'break', blind1: 0, blind2: 0, ante: 0, minutes: 5, label: '休息时间 2' },
                { type: 'blind', blind1: 1500, blind2: 3000, ante: 0, minutes: 15, label: '盲注级别 9' },
                { type: 'blind', blind1: 2000, blind2: 4000, ante: 0, minutes: 15, label: '盲注级别 10' },
                { type: 'blind', blind1: 2500, blind2: 5000, ante: 0, minutes: 15, label: '盲注级别 11' },
                { type: 'blind', blind1: 3000, blind2: 6000, ante: 0, minutes: 15, label: '盲注级别 12' },
            ];

            function loadLevels() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            return parsed.map(lv => ({
                                type: lv.type === 'break' ? 'break' : 'blind',
                                blind1: lv.type === 'break' ? 0 : (parseInt(lv.blind1) || 0),
                                blind2: lv.type === 'break' ? 0 : (parseInt(lv.blind2) || 0),
                                ante: lv.type === 'break' ? 0 : (parseInt(lv.ante) || 0),
                                minutes: parseInt(lv.minutes) || 15,
                                label: lv.label || (lv.type === 'break' ? '休息时间' : '盲注级别'),
                            }));
                        }
                    }
                } catch (e) {}
                return JSON.parse(JSON.stringify(DEFAULT_LEVELS));
            }

            function saveLevels(arr) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); return true; } catch (e) { return false; } }

            let levels = loadLevels();
            let levelIndex = 0;
            let secondsLeft = levels[0].minutes * 60;
            let timerInterval = null;
            let isRunning = false;
            let audioCtx = null;
            let settingsEditedLevels = null;

            const elTimer = document.getElementById('timer');
            const elLevelInfo = document.getElementById('levelInfo');
            const elNextPreview = document.getElementById('nextPreview');
            const elStageBadge = document.getElementById('stageBadge');
            const elStartBtn = document.getElementById('startBtn');
            const elPauseBtn = document.getElementById('pauseBtn');
            const elResetBtn = document.getElementById('resetBtn');
            const elPrevBtn = document.getElementById('prevBtn');
            const elNextBtn = document.getElementById('nextBtn');
            const elFullBtn = document.getElementById('fullBtn');
            const elSettingsBtn = document.getElementById('settingsBtn');
            const elProgressBar = document.getElementById('progressBar');
            const elLiveClock = document.getElementById('liveClock');
            const elSettingsOverlay = document.getElementById('settingsOverlay');
            const elSettingsList = document.getElementById('settingsList');
            const elSettingsClose = document.getElementById('settingsClose');
            const elBtnSaveSettings = document.getElementById('btnSaveSettings');
            const elBtnResetDefault = document.getElementById('btnResetDefault');
            const elBtnAddLevel = document.getElementById('btnAddLevel');

            function initAudio() {
                if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; } }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
            }

            function playDangerTick() {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(1200, t);
                    gain.gain.setValueAtTime(0.1, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 0.07);
                } catch (e) {}
            }

            function render() {
                const m = Math.floor(secondsLeft / 60);
                const s = secondsLeft % 60;
                elTimer.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                const lv = levels[levelIndex];
                if (lv.type === 'break') {
                    elLevelInfo.textContent = `☕ 休息时间 — ${lv.minutes} 分钟`;
                    elLevelInfo.classList.add('break-mode');
                    elStageBadge.textContent = '休息中';
                    elStageBadge.classList.add('break-mode');
                    elTimer.classList.add('break-timer');
                    elTimer.classList.remove('warning','danger');
                } else {
                    elLevelInfo.innerHTML = `<span class="blinds-gold">盲注: ${lv.blind1}/${lv.blind2}</span>`;
                    elLevelInfo.classList.remove('break-mode');
                    elStageBadge.textContent = lv.label || '盲注级别';
                    elStageBadge.classList.remove('break-mode');
                    elTimer.classList.remove('break-timer');
                }
                const nextIdx = levelIndex + 1;
                if (nextIdx < levels.length) {
                    const nextLv = levels[nextIdx];
                    elNextPreview.innerHTML = nextLv.type === 'break' ? `<span>下一阶段: ☕ 休息</span> (${nextLv.minutes}分钟)` : `<span>下一级: ${nextLv.blind1}/${nextLv.blind2}</span>`;
                    elNextPreview.style.display = '';
                } else {
                    elNextPreview.innerHTML = '<span>🏆 最终级别</span>';
                    elNextPreview.style.display = '';
                }
                if (lv.type === 'blind' && isRunning) {
                    if (secondsLeft <= 10 && secondsLeft > 0) { elTimer.classList.add('danger'); elTimer.classList.remove('warning'); }
                    else if (secondsLeft <= 60 && secondsLeft > 10) { elTimer.classList.add('warning'); elTimer.classList.remove('danger'); }
                    else { elTimer.classList.remove('warning','danger'); }
                } else if (!isRunning) {
                    elTimer.classList.remove('warning','danger');
                    if (lv.type === 'blind') elTimer.classList.add('paused-blink');
                    else elTimer.classList.remove('paused-blink');
                } else { elTimer.classList.remove('warning','danger','paused-blink'); }
                document.title = `${isRunning?'▶':'⏸'} ${elTimer.textContent} | ${lv.type==='break'?'休息':lv.blind1+'/'+lv.blind2} | NUTS BAR`;
                updateButtonStates();
                renderProgressBar();
            }

            function updateButtonStates() {
                if (isRunning) {
                    elStartBtn.textContent = '▶ 运行中';
                    elStartBtn.classList.add('running');
                    elPauseBtn.textContent = '⏸ 暂停';
                    elPauseBtn.classList.remove('paused-state');
                    elPauseBtn.disabled = false;
                } else {
                    elStartBtn.textContent = '▶ 开始';
                    elStartBtn.classList.remove('running');
                    elPauseBtn.textContent = '⏸ 暂停';
                    elPauseBtn.classList.add('paused-state');
                    elPauseBtn.disabled = true;
                }
            }

            function renderProgressBar() {
                let html = '';
                for (let i = 0; i < levels.length; i++) {
                    let cls = 'progress-dot';
                    if (i === levelIndex) cls += ' active';
                    else if (i < levelIndex) cls += ' done';
                    if (levels[i].type === 'break') cls += ' break-dot';
                    html += `<span class="${cls}" data-index="${i}" title="${levels[i].type==='break'?'休息':levels[i].blind1+'/'+levels[i].blind2}"></span>`;
                }
                elProgressBar.innerHTML = html;
                elProgressBar.querySelectorAll('.progress-dot').forEach(dot => {
                    dot.addEventListener('click', function(){
                        const idx = parseInt(this.getAttribute('data-index'));
                        if (idx !== levelIndex) jumpToLevel(idx);
                    });
                });
            }

            function startTimer() {
                if (isRunning || levels.length === 0) return;
                initAudio();
                isRunning = true;
                elTimer.classList.remove('paused-blink');
                updateButtonStates();
                const endTime = Date.now() + secondsLeft * 1000;
                timerInterval = setInterval(() => {
                    const now = Date.now();
                    const remaining = Math.max(0, Math.round((endTime - now) / 1000));
                    const prevSeconds = secondsLeft;
                    secondsLeft = remaining;
                    render();
                    if (levels[levelIndex].type === 'blind' && isRunning && secondsLeft <= 10 && secondsLeft > 0 && secondsLeft < prevSeconds) {
                        playDangerTick();
                    }
                    if (secondsLeft <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        isRunning = false;
                        advanceToNextLevel();
                    }
                }, 200);
            }

            function pauseTimer() {
                if (!isRunning) return;
                clearInterval(timerInterval);
                timerInterval = null;
                isRunning = false;
                elTimer.classList.remove('warning','danger');
                if (levels[levelIndex].type === 'blind') elTimer.classList.add('paused-blink');
                updateButtonStates();
                render();
            }

            function resetTimer() {
                pauseTimer();
                levelIndex = 0;
                secondsLeft = levels.length > 0 ? levels[0].minutes * 60 : 0;
                elTimer.classList.remove('warning','danger','paused-blink','break-timer');
                elLevelInfo.classList.remove('break-mode');
                elStageBadge.classList.remove('break-mode');
                updateButtonStates();
                render();
                document.title = 'NUTS BAR 升盲系统';
            }

            function jumpToLevel(idx) {
                if (idx < 0 || idx >= levels.length) return;
                const wasRunning = isRunning;
                pauseTimer();
                levelIndex = idx;
                secondsLeft = levels[levelIndex].minutes * 60;
                updateButtonStates();
                render();
                if (wasRunning) startTimer();
            }

            function advanceToNextLevel() {
                if (levelIndex < levels.length - 1) {
                    levelIndex++;
                    secondsLeft = levels[levelIndex].minutes * 60;
                    updateButtonStates();
                    render();
                    startTimer();
                } else {
                    isRunning = false;
                    clearInterval(timerInterval);
                    timerInterval = null;
                    elTimer.classList.remove('warning','danger','paused-blink','break-timer');
                    elLevelInfo.classList.remove('break-mode');
                    elStageBadge.classList.remove('break-mode');
                    elLevelInfo.innerHTML = '<span style="font-size:1.3em;">🏆 锦标赛结束！</span>';
                    elNextPreview.style.display = 'none';
                    elStageBadge.textContent = '结束';
                    updateButtonStates();
                    render();
                    document.title = '🏆 锦标赛结束 | NUTS BAR';
                }
            }

            function prevLevel() { if (levelIndex <= 0) return; const was = isRunning; pauseTimer(); levelIndex--; secondsLeft = levels[levelIndex].minutes * 60; updateButtonStates(); render(); if (was) startTimer(); }
            function nextLevel() { if (levelIndex >= levels.length - 1) return; const was = isRunning; pauseTimer(); levelIndex++; secondsLeft = levels[levelIndex].minutes * 60; updateButtonStates(); render(); if (was) startTimer(); }

            async function toggleFullscreen() {
                try {
                    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                        if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
                        else if (document.documentElement.webkitRequestFullscreen) await document.documentElement.webkitRequestFullscreen();
                    } else {
                        if (document.exitFullscreen) await document.exitFullscreen();
                        else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
                    }
                } catch (e) {}
            }

            function updateLiveClock() {
                const now = new Date();
                elLiveClock.innerHTML = `<span class="clock-label">当前时间</span>${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            }

            function openSettings() { settingsEditedLevels = JSON.parse(JSON.stringify(levels)); renderSettingsList(); elSettingsOverlay.classList.add('open'); }
            function closeSettings() { elSettingsOverlay.classList.remove('open'); settingsEditedLevels = null; }
            function renderSettingsList() {
                if (!settingsEditedLevels) return;
                let html = '';
                settingsEditedLevels.forEach((lv, idx) => {
                    const isBreak = lv.type === 'break';
                    html += `<div class="settings-row${isBreak?' break-row':''}">
                        <span class="row-num">${idx+1}</span>
                        <select class="type-select" data-index="${idx}"><option value="blind"${!isBreak?' selected':''}>盲注</option><option value="break"${isBreak?' selected':''}>休息</option></select>
                        <input type="number" class="num-input" value="${lv.blind1}" data-index="${idx}" data-field="blind1"${isBreak?' disabled':''}>
                        <span style="color:var(--text-dim);font-size:14px;">/</span>
                        <input type="number" class="num-input" value="${lv.blind2}" data-index="${idx}" data-field="blind2"${isBreak?' disabled':''}>
                        <span style="color:var(--text-muted);font-size:11px;">分</span>
                        <input type="number" class="num-input" value="${lv.minutes}" data-index="${idx}" data-field="minutes" min="1">
                        <input type="text" class="label-input" value="${lv.label||''}" data-index="${idx}" data-field="label" placeholder="标签">
                        <button class="row-delete" data-index="${idx}">✕</button>
                    </div>`;
                });
                elSettingsList.innerHTML = html;
                elSettingsList.querySelectorAll('.type-select').forEach(sel => sel.addEventListener('change', function(){
                    const idx = +this.dataset.index;
                    settingsEditedLevels[idx].type = this.value;
                    if (this.value === 'break') { settingsEditedLevels[idx].blind1 = 0; settingsEditedLevels[idx].blind2 = 0; }
                    renderSettingsList();
                }));
                elSettingsList.querySelectorAll('.num-input, .label-input').forEach(inp => inp.addEventListener('input', function(){
                    const idx = +this.dataset.index;
                    const field = this.dataset.field;
                    if (field === 'blind1') settingsEditedLevels[idx].blind1 = Math.max(0, +this.value||0);
                    if (field === 'blind2') settingsEditedLevels[idx].blind2 = Math.max(0, +this.value||0);
                    if (field === 'minutes') settingsEditedLevels[idx].minutes = Math.max(1, Math.min(120, +this.value||15));
                    if (field === 'label') settingsEditedLevels[idx].label = this.value;
                }));
                elSettingsList.querySelectorAll('.row-delete').forEach(btn => btn.addEventListener('click', function(){
                    if (settingsEditedLevels.length <= 1) { alert('至少保留一个级别'); return; }
                    settingsEditedLevels.splice(+this.dataset.index, 1);
                    renderSettingsList();
                }));
            }
            function saveSettingsAndApply() {
                if (!settingsEditedLevels || settingsEditedLevels.length === 0) return;
                const n = settingsEditedLevels.map(lv => ({
                    type: lv.type === 'break' ? 'break' : 'blind',
                    blind1: lv.type === 'break' ? 0 : (+lv.blind1||0),
                    blind2: lv.type === 'break' ? 0 : (+lv.blind2||0),
                    ante: 0,
                    minutes: +lv.minutes||15,
                    label: lv.label || (lv.type === 'break' ? '休息时间' : '盲注级别'),
                }));
                if (saveLevels(n)) { levels = JSON.parse(JSON.stringify(n)); closeSettings(); resetTimer(); } else alert('保存失败');
            }
            function resetSettingsToDefault() { settingsEditedLevels = JSON.parse(JSON.stringify(DEFAULT_LEVELS)); renderSettingsList(); }
            function addLevel() {
                if (!settingsEditedLevels) return;
                const last = settingsEditedLevels[settingsEditedLevels.length-1] || { type:'blind', blind1:100, blind2:200, ante:0, minutes:15, label:'盲注级别' };
                settingsEditedLevels.push({ ...last, label: last.type==='break'?'休息时间':'盲注级别' });
                renderSettingsList();
                setTimeout(()=>{ elSettingsList.scrollTop = elSettingsList.scrollHeight; }, 100);
            }

            elStartBtn.addEventListener('click', startTimer);
            elPauseBtn.addEventListener('click', pauseTimer);
            elResetBtn.addEventListener('click', resetTimer);
            elPrevBtn.addEventListener('click', prevLevel);
            elNextBtn.addEventListener('click', nextLevel);
            elFullBtn.addEventListener('click', toggleFullscreen);
            elSettingsBtn.addEventListener('click', openSettings);
            elSettingsClose.addEventListener('click', closeSettings);
            elBtnSaveSettings.addEventListener('click', saveSettingsAndApply);
            elBtnResetDefault.addEventListener('click', resetSettingsToDefault);
            elBtnAddLevel.addEventListener('click', addLevel);
            elSettingsOverlay.addEventListener('click', e => { if (e.target === elSettingsOverlay) closeSettings(); });

            document.addEventListener('keydown', e => {
                if (elSettingsOverlay.classList.contains('open') && e.key === 'Escape') { e.preventDefault(); closeSettings(); return; }
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
                switch (e.key.toLowerCase()) {
                    case ' ': e.preventDefault(); isRunning ? pauseTimer() : startTimer(); break;
                    case 'arrowleft': e.preventDefault(); prevLevel(); break;
                    case 'arrowright': e.preventDefault(); nextLevel(); break;
                    case 'r': e.preventDefault(); resetTimer(); break;
                    case 'f': e.preventDefault(); toggleFullscreen(); break;
                }
            });

            updateLiveClock();
            setInterval(updateLiveClock, 15000);
            updateButtonStates();
            render();
            renderProgressBar();
            elTimer.classList.add('paused-blink');
            document.title = 'NUTS BAR 升盲系统';
        })();
    </script>
</body>
</html>
